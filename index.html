<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nest Guard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
        }

        .container {
            width: 320px;
            height: 580px; /* Compact height as requested */
            background: url("background.jpeg") no-repeat center;
            background-size: cover;
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            border: none; /* Removed the white border line */
            overflow: hidden;
        }

        /* Removes the white box from your logo.jpeg */
        .logo-top {
            width: 140px;
            margin-top: -10px;
            mix-blend-mode: multiply; 
            display: block;
        }

        /* The Welcome text positioned above the background's middle logo */
        .welcome-top {
            text-align: center;
            margin-top: 210px; /* Adjust this to sit right above the cloud logo */
        }

        .welcome-top h3 {
            color: #1e3a8a;
            font-size: 19px;
            font-weight: 700;
        }

        .welcome-top p {
            color: #64748b;
            font-size: 13px;
        }

        /* Spacer to skip over the baby logo already in the background image */
        .spacer {
            height: 160px; 
        }

        .button-group {
            width: 100%;
            margin-top: auto; /* Pushes buttons to the bottom */
            padding-bottom: 0px;
            text-align: center;
        }

        .btn-register {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 25px;
            font-size: 17px;
            font-weight: 700;
            color: white;
            background: linear-gradient(to right, #4dafff, #f472b6);
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-login {
            width: 100%;
            height: 45px;
            border: 2px solid #4dafff;
            border-radius: 25px;
            font-size: 17px;
            font-weight: 700;
            color: #1e3a8a;
            background: white;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .footer-text {
            font-size: 12px;
            color: #64748b;
            padding-bottom: -10px; /* Ensures last line is seen */
        }

        .footer-text a {
            color: #3b82f6;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpeg" class="logo-top">

        <div class="welcome-top">
            <h3>Welcome to Nest Guard</h3>
            <p>Safe, trusted care for your little ones</p>
        </div>

        <div class="spacer"></div>

        <div class="button-group">
            <button class="btn-register" onclick="location.href='reg.html'">Register</button>
            <button class="btn-login" onclick="location.href='login.html'">Login</button>
            
            <p class="footer-text">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>
</body>
</html>
