<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule and Relax</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#fbcfe8,#dbeafe);
}

.mobile{
  width:330px;
  height:560px;
  background:#f5f3ff;
  border-radius:35px;
  padding:25px;
  position:relative;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);

  background-image:url("image2.jpg");
  background-size:cover;
  background-position:center;
}

/* image circle */
.image-box{
  width:200px;
  height:200px;
  background:#ffffff;
  border-radius:50%;
  margin:60px auto 25px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.image-box img{
  width:120px;
}

/* text */
h2{
  text-align:center;
  font-size:22px;
  color:#1e3a8a;
  margin-bottom:12px;
}

p{
  text-align:center;
  font-size:14px;
  color:#6b7280;
  line-height:1.5;
  margin-bottom:40px;
}

/* rounded rectangle button */
.btn{
  width:180px;
  height:50px;
  border:none;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto;
  font-size:16px;
  font-weight:500;
  color:white;
  background:linear-gradient(135deg,#ec4899,#3b82f6);
  cursor:pointer;
}

a{
  text-decoration:none;
}
</style>
</head>

<body>

<div class="mobile">

  <div class="image-box">
    <img src="https://cdn-icons-png.flaticon.com/512/2965/2965567.png">
  </div>

  <h2>Schedule and Relax</h2>
  <p>
    Concentrate on your activities.<br>
    Nanny will take care of babies
  </p>

  <!-- SAME BUTTON STYLE AS LAST PAGE -->
  <a href="babysitter2.html">
    <button class="btn">Next</button>
  </a>

</div>

</body>
</html>
