<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>
/* --- Aapka pasandida CSS --- */
body{
    background-image: url('image5.jpeg');
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    color: white; 
}

/* Centered form container */
.form-container {
    width: 280px; 
    margin: 50px auto;
    background: transparent;
    padding: 20px; 
    border-radius: 10px;
    box-shadow: 0px 0px 10px #000;
}

/* Form text (Name, Address, etc.) */
.form-container p {
    margin-top: 5px;
    margin-bottom: 5px;
    color: black;
}

/* Input fields */
.form-container input[type="text"],
.form-container input[type="password"],
.form-container select {
    width: 100%;
    padding: 5px; 
    margin-bottom: 10px; 
    border: 1px solid #444; 
    border-radius: 3px;
    box-sizing: border-box; 
    background-color: white; 
    color: black;
    font-size: 14px;
}

/* Buttons */
.form-container input[type="submit"],
.form-container input[type="reset"] {
    padding: 8px 15px; 
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: background-color 0.3s;
}

/* Submit button */
.form-container input[type="submit"] {
    background-color: #f57ae0;
    color: white;
}

.form-container input[type="submit"]:hover {
    background-color: #7d266f;
}

/* Reset button */
.form-container input[type="reset"] {
    background-color: #7eeff9;
    color: white;
}

.form-container input[type="reset"]:hover {
    background-color: #1b6970;
}

/* Checkbox label */
.form-container label {
    color: black;
    font-size: 13px;
}

/* Already registered text */
.already-registered {
    text-align: center;
    margin-top: 10px; 
    font-size: 12px;
    color: black;
}

.already-registered a {
    color: #7d266f; 
    text-decoration: none;
    font-weight: bold;
}

.already-registered a:hover {
    text-decoration: underline;
}
</style>

<script>
async function fun(event){
    event.preventDefault(); // Page refresh hone se rokne ke liye

    var form = document.forms.RegForm;
    var name = form.Name.value;
    var email = form.Email.value;
    var phone = form.Telephone.value;
    var password = form.Password.value;
    var address = form.Address.value;
    var city = form.City.value;

    // --- Validation Section ---
    if(name == "" || address == "" || email == "" || password.length < 6 || phone == "" || city == "Select City"){
        alert("Please fill all details correctly!");
        return false;
    }

    if(!form.Terms.checked){
        alert("You must agree to the Terms");
        return false;
    }

    try {
        const response = await fetch('http://localhost:5000/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                username: name, 
                address: address,
                email: email, 
                password: password ,
                telephone: phone,
                city: city
            })
        });

        const result = await response.json();
        
        if (response.ok) {
            alert(result.message);

            // --- Step 1: Save current user for home page ---
            localStorage.setItem("currentUser", JSON.stringify({
                name: name,
                address: address
            }));

            // --- Step 2: Maintain ALL registered users ---
            let users = JSON.parse(localStorage.getItem("users")) || [];

            // Check if email already exists
            let exists = users.some(u => u.email === email);
            if(!exists){
                users.push({
                    name: name,
                    email: email,
                    password: password,
                    address: address,
                    telephone: phone,
                    city: city
                });
                localStorage.setItem("users", JSON.stringify(users));
            } else {
                alert("User with this email already registered!");
                return false;
            }

            window.location.href = "login.html"; // Success ke baad login page par bhejo
        } else {
            alert(result.message);
        }
    } catch (error) {
        console.error("Server error:", error);
        alert("Server is not connected");
    }
}
</script>
</head>

<body>

<h1 style="text-align:center; color:black; margin-top:50px; font-size:25px;">
    REGISTRATION FORM
</h1>

<div class="form-container">
    <form name="RegForm" onsubmit="fun(event)">

        <p>Name:<br>
        <input type="text" name="Name" placeholder="Enter your Name"></p>

        <p>Address:<br>
        <input type="text" name="Address" placeholder="Enter your Address"></p>

        <p>Email Address:<br>
        <input type="text" name="Email" placeholder="Enter your Email"></p>

        <p>Password:<br>
        <input type="password" name="Password" placeholder="Enter your Password"></p>

        <p>Telephone Number:<br>
        <input type="text" name="Telephone" placeholder="Enter your Phone Number"></p>

        <p>Select Your City:<br>
        <select name="City">
            <option>Select City</option>
            <option>Mumbai</option>
            <option>Delhi</option>
            <option>Pune</option>
            <option>Chennai</option>
            <option>Bengaluru</option>
            <option>Gujarat</option>
        </select>
        </p>

        <p>
        <input type="checkbox" name="Terms" id="Terms">
        <label for="Terms">
            I agree to the <a href="terms.html" target="_blank" style="color:#701b6a;">Terms and Conditions</a>
        </label>
        </p>

        <p style="text-align:center;">
            <input type="submit" value="Register">
            <input type="reset" value="Reset">
        </p>

    </form>

    <div class="already-registered">
        Already have an account? <a href="login.html">Login</a>
    </div>

</div>

</body>
</html>
